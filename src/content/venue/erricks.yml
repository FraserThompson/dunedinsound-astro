title: Erricks
description: |
  Erricks arose from the corpse of <a href="/venues/new_new_new">New New New</a> and immediately started serving 
  330ml "pints" in branded plastic cups. It went on to become the PREMIUM destination
  for yuppies of Dunedin to have their wedding receptions, as well as hosting the odd gig here and there.
  Shortly after, the Lobo dynasty offloaded their two venues (the other being <a href="/venues/dropkicks">Dropkicks</a>) to a new owner.
  But in May of 2026 it all came crashing down: A patron was accidentally locked in the Dropkicks bathroom and the new owner, admittedly out of her depth,
  <a title="ODT: 'Lowest point of my life': Owner abandons two Dunedin venues" href="https://www.odt.co.nz/news/dunedin/lowest-point-my-life-owner-abandons-two-dunedin-venues" target="_blank"> ran for the hills.</a>
lat: -45.8842392
lng: 170.4982601
