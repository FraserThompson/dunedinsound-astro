title: Dropkicks
lat: -45.8665723
lng: 170.5092476
date: 2025-05-01T00:00:00.000Z
died: 2026-05-05T00:00:00.000Z
description: |
  After the unceremonious closure of <a href="/venues/dive">Dive</a>, the upstairs of the former 
  <a href="/venues/the_captain_cook_hotel">Captain Cook Hotel</a> sat vacant until the Lobo dynasty decided to take the reigns. 
  It became Dropkicks, there was fake greenery and neon platitudes everywhere, the 
  sound desk went, and they stopped serving beer on tap. Much like the other Lobo 
  venture <a href="/venues/erricks">Erricks</a>, it felt like the focus was more 
  on events (21st parties, etc) than gigs, but beggars can't be choosers.
  Shortly after, the Lobo dynasty offloaded their two venues to a new owner.
  But in May of 2026 it all came crashing down: A patron was accidentally locked in the bathroom and the new owner, admittedly out of her depth,
  <a title="ODT: 'Lowest point of my life': Owner abandons two Dunedin venues" href="https://www.odt.co.nz/news/dunedin/lowest-point-my-life-owner-abandons-two-dunedin-venues" target="_blank"> ran for the hills.</a>
