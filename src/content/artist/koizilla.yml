    snippet: "After close to a decade, five EPs and three albums and performing to audiences from Dunedin's Crown Hotel to Auckland's Spark Arena, Dunedin psych-rock band Koizilla played their “final” show in November 2025."
died: 2025-11-28T00:00:00.000Z
