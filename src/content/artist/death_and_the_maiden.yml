  audioculture:
    link: https://www.audioculture.co.nz/profile/death-and-the-maiden
    snippet:
      "Over the last 15 years, the Dunedin dream-pop/post-punk trio Death and the Maiden has released three critically loved albums: Death and the Maiden, Wisteria, and Uneven Ground.
      They have made music that feels distinctly Southern, but rather than just replicating the sensibilities associated with Flying Nun, Xpressway and Corpus Hermeticum, they add new electronic shades and textures to the Dunedin story.
      Along the way, they have cultivated a cult audience at home and abroad, while doing things on their own timescale."
