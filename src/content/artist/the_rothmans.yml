title: The Rothmans
description: The Rothmans's enigmatic live act captured the hearts and minds of the Ōtepoti underground, right up until they decided to leave the country in 2019. For the following seven years they captured the hearts and minds of the Bristol underground instead, until the passing of guitarist Jaye forced things to an abrupt and tragic halt.
